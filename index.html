<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TodoPro - Simple task management for teams">
    <title>TodoPro - bKash Payments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-overlay" class="auth-overlay" style="display: flex;">
        <div id="login-form" class="auth-form">
            <h2>Welcome Back</h2>
            <p class="form-subtitle">Sign in to your account</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <p id="login-error" class="error-message" style="display:none;"></p>
                <button type="submit" class="btn-primary btn-block">Sign In</button>
            </form>
            <p class="form-footer">
                Don't have an account? <a href="#" onclick="showAuthTab('register')">Create account</a>
            </p>
        </div>
        <div id="register-form" class="auth-form" style="display: none;">
            <h2>Create Account</h2>
            <p class="form-subtitle">Start your free trial</p>
            <form onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="register-firstname">First Name</label>
                        <input type="text" id="register-firstname" required>
                    </div>
                    <div class="form-group">
                        <label for="register-lastname">Last Name</label>
                        <input type="text" id="register-lastname" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" placeholder="Min. 8 characters" required minlength="8">
                </div>
                <p id="register-error" class="error-message" style="display:none;"></p>
                <button type="submit" class="btn-primary btn-block">Start Free Trial</button>
            </form>
            <p class="form-footer">
                Have an account? <a href="#" onclick="showAuthTab('login')">Sign in</a>
            </p>
        </div>
    </div>

    <div id="app-section" style="display: none;">
        <header class="site-header">
            <div class="header-content">
                <div class="logo"><h1>TodoPro</h1></div>
                <nav class="navbar">
                    <ul class="nav-list">
                        <li><a href="#" onclick="switchView('tasks')" class="active">Tasks</a></li>
                    </ul>
                </nav>
                <div id="user-section"></div>
            </div>
        </header>

        <main>
            <section class="todo-app-section">
                <div class="section-header">
                    <div class="section-title-row">
                        <div>
                            <p class="eyebrow">Workspace</p>
                            <h2 id="workspace-name">My Workspace</h2>
                        </div>
                        <button onclick="showPaymentModal()" class="btn-primary">Upgrade to Pro - ৳500/month</button>
                    </div>
                </div>

                <div class="todo-app-container">
                    <div class="todo-header">
                        <h3>Tasks</h3>
                        <span id="task-count">0</span> tasks
                    </div>
                    <div class="todo-input-section">
                        <input type="text" id="todoInput" placeholder="New task...">
                        <button id="addBtn" class="btn-primary">Add</button>
                    </div>
                    <ul id="todoList" class="todo-list"></ul>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
